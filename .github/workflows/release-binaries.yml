# Build self-contained `shreni` executables via Node SEA and attach them to a
# GitHub Release (Shreni-beads-lbx). SEA cannot cross-compile, so each target is
# built on its own runner. Runners use official Node from actions/setup-node,
# which ships the SEA fuse sentinel postject needs (Homebrew's node does not).
#
# Trigger: push a version tag (v*), or run manually for a dry build (artifacts
# only, no release).
name: release-binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # Single canonical gate — the suite isn't guaranteed Windows-clean, so run it
  # once on Linux rather than per-runner where a path-quirk failure would block
  # the whole release.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  build:
    needs: test
    permissions:
      contents: write  # attach binaries to the GitHub Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14      # darwin-arm64
          - os: macos-13      # darwin-x64
          - os: ubuntu-latest # linux-x64
          - os: windows-latest # win32-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # onlyBuiltDependencies (package.json) whitelists esbuild's native build.
      - run: pnpm install --frozen-lockfile

      - run: pnpm build:binary

      - name: Checksums (display)
        shell: bash
        run: cat build/*.sha256

      # build/shreni-* covers both the executable and its .sha256 sidecar; the
      # intermediate shreni.cjs bundle does not match (no hyphen).
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shreni-${{ matrix.os }}
          path: build/shreni-*
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/shreni-*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}